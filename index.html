<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SPA Fractal Projects</title>
  <style>
    html, body { height:100%; margin:0; padding:0; }
    .spa-page { display: none; }
    .spa-page.active { display: block; }
    #fractals-page {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
      z-index: 10;
      overflow: hidden;
    }
    #gfx {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #222;
    }
    .spa-back {
      position: absolute; top: 10px; left: 10px; z-index: 20;
    }
  </style>
</head>
<body>
  <div id="homepage" class="spa-page active">
    <h1>Welcome to My Projects</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed posuere sem ut pulvinar ultricies...</p>
    <div id="project-buttons">
      <button data-project="fractals">Fractals</button>
      <button data-project="empty1">Empty Project 1</button>
      <button data-project="empty2">Empty Project 2</button>
      <button data-project="empty3">Empty Project 3</button>
    </div>
  </div>
  <div id="fractals-page" class="spa-page">
	<button class="spa-back">Back</button>
	<button id="mandelbrot">Mandelbrot</button>
	<button id="multibrot">Multibrot</button>
	<button id="nova">Nova</button>
	<canvas id="gfx"></canvas>
	</div>
    <canvas id="gfx"></canvas>
  </div>
  <div id="empty1-page" class="spa-page">
    <button class="spa-back">Back</button>
    <h2>Empty Project 1</h2>
  </div>
  <div id="empty2-page" class="spa-page">
    <button class="spa-back">Back</button>
    <h2>Empty Project 2</h2>
  </div>
  <div id="empty3-page" class="spa-page">
    <button class="spa-back">Back</button>
    <h2>Empty Project 3</h2>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
